            <form name="contact-request" id="form-input">
                <div>
                    <label for="txtName/Company">Name/Company</label>
                    <input type="text" id="txtName/Company" name="lblName/Company" placeholder="Amara Jane">
                </div>

                <div>
                    <label for="txtDesignerChoice">What kind of decal are you looking for?</label>
                    <input type="text" id="txtDesignerChoice" name="lblDesignerChoice" placeholder="Dotted Mural, Repeating pattern, Etc.">

                    <label for="txtEmail">What's a good email for you?</label>
                    <input type="text" id="txtEmail" name="lblEmail" placeholder="AmaraEmail@gmail.com">

                    <label for="txtComment">Any additional comments or questions?</label>
                    <input type="text" id="txtComment" name="lblComment" placeholder="">
                </div>

                <!--Format and send info to email-->
